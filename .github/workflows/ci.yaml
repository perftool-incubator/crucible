name: CI

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}/ci
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      only-docs: ${{ steps.filter.outputs.only_changed }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: tj-actions/changed-files@v47
        with:
          files: |
            LICENSE
            *.md
            **/*.md
            .github/rulesets/**
            .github/workflows/run-crucible-tracking.yaml
            .github/workflows/crucible-scheduled.yaml
            .github/workflows/crucible-weekly-ci.yaml
            .github/workflows/crucible-release-ci.yaml
            .github/workflows/crucible-release-schedule.yaml
            .github/workflows/crucible-release.yaml
            .github/workflows/crucible-ci.yaml
            .github/workflows/ci.yaml
            docs/**
            spec/**

  install:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.only-docs != 'true' }}
    runs-on: [ self-hosted, aws-cloud-1 ]
    steps:
      - uses: actions/checkout@v4
      - name: Run install tests
        run: ./tests/test-installer

  faux-install:
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.only-docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: 'echo "faux-install complete"'

  ci-complete:
    needs: [ install, faux-install ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Results
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: complete
        run: echo "ci complete"
