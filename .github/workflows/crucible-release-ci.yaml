name: crucible-release-ci

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}/release-ci
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      only-docs: ${{ steps.filter.outputs.only_changed }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: tj-actions/changed-files@v47
        with:
          files: |
            LICENSE
            *.md
            **/*.md
            .github/rulesets/**
            .github/workflows/run-crucible-tracking.yaml
            .github/workflows/crucible-weekly-ci.yaml
            .github/workflows/crucible-scheduled.yaml
            .github/workflows/crucible-release-schedule.yaml
            .github/workflows/crucible-release-ci.yaml
            .github/workflows/crucible-ci.yaml
            .github/workflows/ci.yaml
            docs/**
            spec/**

  call-crucible-release-remove:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.only-docs != 'true' }}
    uses: ./.github/workflows/crucible-release.yaml
    with:
      custom_release: "ci-version-test"
      action: "delete"
      force_create: true
    secrets:
      PRIVATE_KEY__TAG_CRUCIBLE_RELEASE: ${{ secrets.PRIVATE_KEY__TAG_CRUCIBLE_RELEASE }}

  call-crucible-release-create:
    needs: call-crucible-release-remove
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.only-docs != 'true' }}
    uses: ./.github/workflows/crucible-release.yaml
    with:
      custom_release: "ci-version-test"
      action: "create"
    secrets:
      PRIVATE_KEY__TAG_CRUCIBLE_RELEASE: ${{ secrets.PRIVATE_KEY__TAG_CRUCIBLE_RELEASE }}

  call-crucible-release-update:
    needs: call-crucible-release-create
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.only-docs != 'true' }}
    uses: ./.github/workflows/crucible-release.yaml
    with:
      custom_release: "ci-version-test"
      action: "update"
    secrets:
      PRIVATE_KEY__TAG_CRUCIBLE_RELEASE: ${{ secrets.PRIVATE_KEY__TAG_CRUCIBLE_RELEASE }}

  faux-crucible-release-ci:
    needs: changes
    if: ${{ github.event_name != 'workflow_dispatch' && needs.changes.outputs.only-docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "faux-crucible-release-ci-complete"

  crucible-release-ci-complete:
    needs: [ call-crucible-release-update, faux-crucible-release-ci ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check Results
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: complete
        run: echo "crucible-release-ci-complete"
